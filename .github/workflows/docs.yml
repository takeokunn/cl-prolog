name: Publish documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CACHIX_CACHE: ${{ vars.CACHIX_CACHE }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Configure Cachix (pull-only)
        if: ${{ env.CACHIX_CACHE != '' && env.CACHIX_AUTH_TOKEN == '' }}
        uses: cachix/cachix-action@02b16339eddcf6ea27126a830c7f1992855cae13 # v17
        with:
          name: ${{ env.CACHIX_CACHE }}
          extraPullNames: nix-community
          skipPush: true
      - name: Configure Cachix (push-enabled)
        if: ${{ env.CACHIX_CACHE != '' && env.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@02b16339eddcf6ea27126a830c7f1992855cae13 # v17
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community
      - name: Build documentation
        run: |
          nix build .#docs
          cp -rL result public
          chmod -R u+w public
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
